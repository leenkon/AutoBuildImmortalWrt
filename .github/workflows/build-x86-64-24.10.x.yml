name: build-x86-64-immortalwrt-24.10.x

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择luci版本"
        required: false
        default: "24.10.5"
        type: choice
        options:
          - 24.10.0
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
      custom_router_ip:
        description: "请设置路由器的管理地址(仅对多网口路由器有效) 格式:192.168.x.1 或 10.x.x.1"
        required: true
        default: "10.10.10.1"
      profile:
        description: '请输入要编译固件大小 单位(MB)'
        required: true
        default: '960'
      enable_store:
        description: "集成 store 商店"
        required: false
        type: boolean
        default: false
      include_docker:
        description: |
          是否编译 Docker 插件
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否配置PPPoE拨号信息?"
        required: true
        default: 'yes'
        type: choice
        options:
        - 'yes'
        - 'no'
      pppoe_account:
        description: "宽带账号 (若启用PPPoE)"
        required: false
        default: 'CD02861565686'
      pppoe_password:
        description: "宽带密码 (若启用PPPoE)"
        required: false
        default: '20050608'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/x86-64/build24.sh

      - name: Save Custom Router IP into OpenWrt files
        run: |
          mkdir -p "${{ github.workspace }}/custom"
          echo "${{ github.event.inputs.custom_router_ip }}" > "${{ github.workspace }}/custom/custom_router_ip.txt"
          echo "您设置的路由器管理地址是:${{ github.event.inputs.custom_router_ip }}"
          # 后续步骤会将该文件映射到路由器/etc/config/custom_router_ip.txt 以便用于开机脚本99-custom.sh读取用户设置的ip
      
      - name: Validate PPPoE Inputs
        run: |
          if [[ "${{ github.event.inputs.enable_pppoe }}" == "yes" ]]; then
            if [[ -z "${{ github.event.inputs.pppoe_account }}" || -z "${{ github.event.inputs.pppoe_password }}" ]]; then
              echo "Error: PPPoE account and password must be provided when PPPoE is enabled!"
              exit 1
            fi
          fi
      
      - name: Enable Store integration
        run: |
          if [ "${{ github.event.inputs.enable_store }}" == "true" ]; then
            echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES luci-app-store"' >> shell/custom-packages.sh
            echo "✅ 已追加 luci-app-store"
          else
            echo "❎ 未启用 luci-app-store"
          fi

      - name: Check imm.config file exists
        run: |
          if [ ! -f "${{ github.workspace }}/x86-64/imm.config" ]; then
            echo "❌ 错误: imm.config 文件不存在于 ${{ github.workspace }}/x86-64/"
            ls -la "${{ github.workspace }}/x86-64/" || true
            exit 1
          fi
          echo "✅ imm.config 文件存在"

      - name: Build ImmortalWrt-x86-64-efi 24.10.x
        run: |
          profile="${{ github.event.inputs.profile }}"
          include_docker="${{ github.event.inputs.include_docker }}"
          luci_version="${{ github.event.inputs.luci_version }}"
          enable_pppoe="${{ github.event.inputs.enable_pppoe }}"
          pppoe_account="${{ github.event.inputs.pppoe_account }}"
          pppoe_password="${{ github.event.inputs.pppoe_password }}"
          
          echo "Building for profile: $profile"
          echo "LuCI version: $luci_version"
          echo "Include Docker: $include_docker"
          echo "Enable PPPoE: $enable_pppoe"
          
          # 创建必要的目录
          mkdir -p "${{ github.workspace }}/bin"
          
          # 使用更简单的方法：将配置文件作为环境变量传递
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/custom:/home/build/immortalwrt/files/etc/config" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build24.sh:/home/build/immortalwrt/build.sh" \
            -e PROFILE="$profile" \
            -e INCLUDE_DOCKER="$include_docker" \
            -e ENABLE_PPPOE="$enable_pppoe" \
            -e PPPOE_ACCOUNT="$pppoe_account" \
            -e PPPOE_PASSWORD="$pppoe_password" \
            -e LUCI_VERSION="$luci_version" \
            immortalwrt/imagebuilder:x86-64-openwrt-${luci_version} /bin/bash -c "
              # 从build24.sh脚本中读取配置，避免直接挂载.config文件
              /home/build/immortalwrt/build.sh
            "
          
          echo "✅ Docker 容器运行完成"

      - name: Check build output
        run: |
          if [ -d "${{ github.workspace }}/bin/targets/x86/64/" ]; then
            echo "✅ 编译输出目录存在"
            ls -la "${{ github.workspace }}/bin/targets/x86/64/" || true
          else
            echo "❌ 编译输出目录不存在"
            echo "当前目录结构:"
            find "${{ github.workspace }}/bin" -type f -name "*.img*" 2>/dev/null || echo "未找到固件文件"
          fi

      - name: Create info
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 📡 路由器后台信息
          <a href="https://wkdaily.cpolar.cn/archives/1">
           <img src="https://img.shields.io/badge/若下载慢可套用国内加速站下载-FC7C0D?logo=github&logoColor=fff&labelColor=000&style=for-the-badge"/>
          </a>
          
          - 🏠 **后台地址**: ${{ github.event.inputs.custom_router_ip }}
          - 👤 **用户名**: root
          - 🔑 **密码**: 无
          EOF

          if [ "${{ github.event.inputs.include_docker }}" == "yes" ]; then
            echo -e "\n#### 默认带docker" >> ${{ github.workspace }}/router-info.md
          else
            echo -e "\n#### 不带docker" >> ${{ github.workspace }}/router-info.md
          fi
          
          if [ "${{ github.event.inputs.enable_store }}" == "true" ]; then
            echo -e "#### 已集成软件商店" >> ${{ github.workspace }}/router-info.md
          fi

      - name: Create Release and Upload Assets
        run: |
          # 首先检查是否有固件文件
          FIRMWARE_FILES=$(find "${{ github.workspace }}/bin" -name "*.img.gz" -o -name "*.img" 2>/dev/null || true)
          
          if [ -z "$FIRMWARE_FILES" ]; then
            echo "❌ 未找到固件文件，跳过创建Release"
            exit 0
          fi
          
          echo "找到固件文件:"
          echo "$FIRMWARE_FILES"
          
          # 创建Release
          TAG_NAME="Autobuild-x86-64-$(date +%Y%m%d-%H%M%S)"
          
          # 使用GitHub CLI创建Release
          gh release create "$TAG_NAME" \
            --title "ImmortalWrt x86-64 自动构建 $(date +%Y-%m-%d)" \
            --notes-file "${{ github.workspace }}/router-info.md" \
            --target "${{ github.ref }}" \
            --repo "${{ github.repository }}"
          
          # 上传固件文件
          echo "$FIRMWARE_FILES" | while read -r file; do
            if [ -f "$file" ]; then
              echo "上传文件: $file"
              gh release upload "$TAG_NAME" "$file" \
                --repo "${{ github.repository }}"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
